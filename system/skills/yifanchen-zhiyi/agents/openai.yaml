interface:
  display_name: "Memcore Cloud Zhiyi"
  short_description: "Use for prior decisions, corrections, already-built work, status, and next steps"
  default_prompt: "Use $yifanchen-zhiyi before memory-dependent answers. Before answering about previous decisions, corrections, project boundaries, forgotten context, already-built work, install/test/release status, source-backed evidence, or short follow-ups in ongoing work such as next step, what else, or then what, call zhiyi_recall first. Treat this as a standing active memory routing rule, not a one-time setup note. For the first install smoke test, use {\"query\":\"capability check\",\"mode\":\"capability_check\"} and do not recall real memory. Default recall is active layered: current window/session first, then same project/workspace, same workstream/task, then stable user preferences/tool facts; raw-pool/global only when explicitly requested. If explicit memory_scope=window returns scope_missing=true or recall_status=window_identity_required, say the current window/session is not bound yet; do not claim there is no memory. If zhiyi_recall is not available, say the Memcore Cloud skill is installed but the MCP/tool connection is missing."
dependencies:
  tools:
    - type: "mcp"
      value: "yifanchen-zhiyi"
      description: "Memcore Cloud local memory service; call zhiyi_recall for source-backed recall before memory-dependent answers"
      transport: "streamable_http"
      url: "http://127.0.0.1:9851/mcp"
policy:
  allow_implicit_invocation: true
