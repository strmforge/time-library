interface:
  display_name: "Memcore Cloud Zhiyi"
  short_description: "Local memory library for prior decisions, corrections, and continuing work"
  default_prompt: "Use $yifanchen-zhiyi as the user's local memory library before answering about previous decisions, corrections, project boundaries, forgotten context, install/test/release status, or next steps in ongoing work. Call zhiyi_recall first and use source refs or raw excerpts when available."
dependencies:
  tools:
    - type: "mcp"
      value: "yifanchen-zhiyi"
      description: "Memcore Cloud local memory service for Zhiyi recall and source evidence"
      transport: "streamable_http"
      url: "http://127.0.0.1:9851/mcp"
policy:
  allow_implicit_invocation: true
